<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathQuest — Email Verified</title>
  <link rel="icon" href="https://smartbloomai.online/favicon.png" type="image/png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #4C35DE 0%, #6C63FF 50%, #9B8FF5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, #4C35DE, #9B8FF5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 44px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 900;
      color: #4C35DE;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .check-circle {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #10B981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #4C35DE, #6C63FF);
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      padding: 16px 40px;
      border-radius: 14px;
      text-decoration: none;
      letter-spacing: 0.2px;
      box-shadow: 0 8px 24px rgba(76, 53, 222, 0.35);
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }

    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #9CA3AF;
    }

    .footer a {
      color: #4C35DE;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧮</div>
    <div class="app-name">MathQuest</div>

    <div class="check-circle">✓</div>

    <h1>Email Verified!</h1>
    <p>
      Your email has been successfully verified.<br/>
      You can now sign in to your MathQuest account and start your learning journey.
    </p>

    <a href="https://smartbloomai.online" class="btn">Open MathQuest →</a>

    <div class="footer">
      <p style="margin-bottom: 4px;">Need help? <a href="mailto:support@smartbloomai.online">support@smartbloomai.online</a></p>
      <p style="margin: 0;">© 2026 MathQuest. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
